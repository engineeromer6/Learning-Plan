<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Cryptography Mastery Plan</title>
<style>
/* ═══════════════════════════════
   VARIABLES
═══════════════════════════════ */
:root {
  --bg:           #ffffff;
  --blob-c:       #dde3f0;

  --surface:      #ffffff;
  --surface-2:    #f7f8fb;
  --surface-3:    #f0f2f8;
  --border:       rgba(0,0,0,0.09);
  --border-hi:    rgba(0,0,0,0.15);

  --shadow-sm:    0 1px 3px rgba(0,0,0,0.07), 0 4px 14px rgba(0,0,0,0.06);
  --shadow-md:    0 2px 6px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.09);
  --shadow-lg:    0 4px 12px rgba(0,0,0,0.10), 0 16px 40px rgba(0,0,0,0.10);
  --shadow-btn:   0 1px 3px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.07);
  --shadow-btn-h: 0 3px 8px rgba(0,0,0,0.13), 0 6px 16px rgba(0,0,0,0.09);

  --text:         #111827;
  --text-2:       #374151;
  --text-3:       #6b7280;
  --text-4:       #9ca3af;

  --accent:       #4f46e5;
  --accent-soft:  rgba(79,70,229,0.07);
  --green:        #059669;
  --green-soft:   rgba(5,150,105,0.06);
  --amber:        #d97706;
  --amber-soft:   rgba(217,119,6,0.06);

  --prog-bg:      linear-gradient(90deg,#4f46e5,#7c3aed);
  --r-card:       18px;
  --r-inner:      12px;
  --r-btn:        999px;
  color-scheme:   light;
}
body.dark {
  --bg:           #0f1117;
  --blob-c:       #1e2540;
  --surface:      rgba(255,255,255,0.06);
  --surface-2:    rgba(255,255,255,0.09);
  --surface-3:    rgba(255,255,255,0.04);
  --border:       rgba(255,255,255,0.11);
  --border-hi:    rgba(255,255,255,0.20);
  --shadow-sm:    0 1px 4px rgba(0,0,0,0.35), 0 4px 14px rgba(0,0,0,0.28);
  --shadow-md:    0 2px 8px rgba(0,0,0,0.45), 0 8px 24px rgba(0,0,0,0.35);
  --shadow-lg:    0 4px 16px rgba(0,0,0,0.55), 0 16px 40px rgba(0,0,0,0.45);
  --shadow-btn:   0 1px 3px rgba(0,0,0,0.50), 0 2px 6px rgba(0,0,0,0.35);
  --shadow-btn-h: 0 3px 8px rgba(0,0,0,0.60), 0 6px 16px rgba(0,0,0,0.45);
  --text:         #f1f5f9;
  --text-2:       #cbd5e1;
  --text-3:       #94a3b8;
  --text-4:       #64748b;
  --accent-soft:  rgba(129,140,248,0.12);
  --green-soft:   rgba(110,231,183,0.08);
  --amber-soft:   rgba(251,191,36,0.08);
  color-scheme:   dark;
}

/* ═══════════════════════════════
   RESET
═══════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; -webkit-tap-highlight-color:transparent; }
body {
  min-height:100vh;
  font-family:system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
  font-size:16px; line-height:1.6;
  color:var(--text); background:var(--bg);
  overflow-x:hidden;
  transition:background .3s, color .25s;
}
body.modal-open { overflow:hidden; }

/* ═══════════════════════════════
   BACKGROUND BLOBS — barely visible on white
═══════════════════════════════ */
.blob-bg { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.blob {
  position:absolute; border-radius:50%;
  background:var(--blob-c);
  filter:blur(120px); opacity:0.22;
  animation:drift linear infinite;
}
body.dark .blob { opacity:0.55; }
.blob-1 { width:700px; height:700px; top:-200px; left:-200px; animation-duration:32s; }
.blob-2 { width:550px; height:550px; top:20%; right:-180px; animation-duration:40s; animation-delay:-14s; }
.blob-3 { width:480px; height:480px; bottom:5%; left:10%; animation-duration:46s; animation-delay:-22s; }
.blob-4 { width:380px; height:380px; bottom:-100px; right:8%; animation-duration:36s; animation-delay:-8s; }
@keyframes drift {
  0%   { transform:translate(0,0) scale(1); }
  25%  { transform:translate(55px,-45px) scale(1.06); }
  50%  { transform:translate(-35px,75px) scale(0.96); }
  75%  { transform:translate(50px,20px) scale(1.04); }
  100% { transform:translate(0,0) scale(1); }
}

/* ═══════════════════════════════
   LAYOUT
═══════════════════════════════ */
.page {
  position:relative; z-index:1;
  max-width:880px; margin:0 auto;
  padding:72px 24px 100px;
}

/* ═══════════════════════════════
   TOOLBAR SYSTEM (replaces fixed theme btn)
═══════════════════════════════ */
#toolbar-toggle {
  position:fixed; bottom:22px; right:22px; z-index:600;
  width:46px; height:46px; border-radius:50%;
  background:var(--surface);
  border:1px solid var(--border-hi);
  box-shadow:var(--shadow-md);
  color:var(--text-2); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  transition:box-shadow .25s, transform .2s, background .2s;
}
#toolbar-toggle:hover { box-shadow:var(--shadow-lg); }
#toolbar-toggle:active { transform:scale(0.90); transition:transform .08s cubic-bezier(.4,0,.2,1); }

#toolbar-panel {
  position:fixed; bottom:80px; right:22px; z-index:599;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-card);
  box-shadow:var(--shadow-lg);
  padding:10px;
  display:flex; flex-direction:column; gap:4px; min-width:200px;
  opacity:0; pointer-events:none;
  transform:translateY(12px) scale(0.96);
  transform-origin:bottom right;
  transition:opacity .22s ease, transform .22s cubic-bezier(.22,1,.36,1);
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
}
#toolbar-panel.open {
  opacity:1; pointer-events:all;
  transform:translateY(0) scale(1);
}
.toolbar-label {
  font-size:10px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:var(--text-4);
  padding:4px 10px 6px; border-bottom:1px solid var(--border);
  margin-bottom:4px;
}
.toolbar-btn {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px; border-radius:var(--r-inner);
  font-size:14px; font-weight:500; color:var(--text-2);
  background:none; border:none; cursor:pointer; font-family:inherit;
  text-align:left; width:100%;
  transition:background .15s, color .15s;
}
.toolbar-btn:hover { background:var(--surface-2); color:var(--text); }
.toolbar-btn:active { transform:scale(0.97); transition:transform .08s; }
.toolbar-btn-icon { font-size:16px; width:22px; text-align:center; flex-shrink:0; }

/* desktop: move to top-right */
@media(min-width:768px) {
  #toolbar-toggle { top:20px; right:20px; bottom:auto; }
  #toolbar-panel {
    top:74px; right:20px; bottom:auto;
    transform:translateY(-10px) scale(0.96);
    transform-origin:top right;
  }
  #toolbar-panel.open { transform:translateY(0) scale(1); }
}

/* ═══════════════════════════════
   HEADER
═══════════════════════════════ */
.header { margin-bottom:40px; }
.eyebrow { font-size:12px; letter-spacing:4px; text-transform:uppercase; color:var(--text-4); margin-bottom:12px; font-weight:500; }
.main-title { font-size:clamp(32px,6vw,50px); font-weight:600; line-height:1.10; letter-spacing:-0.5px; color:var(--text); margin-bottom:10px; }
.sub-title { font-size:17px; color:var(--text-3); font-weight:400; }

/* ═══════════════════════════════
   CARD BASE — white, lifted, clear border
═══════════════════════════════ */
.card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-card);
  box-shadow:var(--shadow-sm);
}

/* ═══════════════════════════════
   STATS
═══════════════════════════════ */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:10px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-card); box-shadow:var(--shadow-sm); padding:18px 14px; text-align:center; }
.sv { font-size:clamp(20px,3.5vw,26px); font-weight:700; color:var(--text); line-height:1; }
.sl { font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-4); margin-top:6px; }

/* ═══════════════════════════════
   PROGRESS
═══════════════════════════════ */
.prog-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-card); box-shadow:var(--shadow-sm); padding:18px 22px; margin-bottom:10px; }
.prog-meta { display:flex; justify-content:space-between; font-size:13px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text-3); margin-bottom:12px; }
.prog-track { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
.prog-fill  { height:100%; border-radius:3px; background:var(--prog-bg); transition:width .5s cubic-bezier(.4,0,.2,1); }

/* ═══════════════════════════════
   COST BOX
═══════════════════════════════ */
.cost-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-card); box-shadow:var(--shadow-sm); margin-bottom:22px; overflow:hidden; }
.cost-head { padding:16px 22px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none; transition:background .2s; }
.cost-head:hover { background:var(--surface-2); }
.cost-head-label { font-size:14px; font-weight:600; letter-spacing:.3px; color:var(--text-2); }
.cost-icon { font-size:12px; color:var(--text-4); transition:transform .25s ease; }
.cost-icon.open { transform:rotate(180deg); }
.cost-body { padding:0 22px 20px; display:none; }
.cost-body.open { display:block; }
.cost-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:0 28px; margin-top:8px; margin-bottom:14px; }
.cost-row { display:flex; justify-content:space-between; font-size:14px; color:var(--text-3); padding:7px 0; border-bottom:1px solid var(--border); gap:8px; }
.cost-row:last-child { border-bottom:none; }
.cost-row span:last-child { font-family:'Courier New',monospace; color:var(--text); white-space:nowrap; font-weight:600; }
.cost-total { font-size:13px; color:var(--text-4); padding-top:12px; border-top:1px solid var(--border); }
.cost-total strong { color:var(--text); }
.free-hi { color:#059669; }
body.dark .free-hi { color:#6ee7b7; }

/* ═══════════════════════════════
   FILTER PILLS
═══════════════════════════════ */
.filter-wrap { margin-bottom:24px; }
.filter-label { font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--text-4); margin-bottom:12px; }
.pill-row { display:flex; flex-wrap:wrap; gap:8px; }
.pill {
  padding:8px 20px; border-radius:var(--r-btn);
  font-size:13px; font-weight:500;
  cursor:pointer;
  background:var(--surface);
  border:1px solid var(--border);
  box-shadow:var(--shadow-btn);
  color:var(--text-2);
  transition:box-shadow .25s, color .2s, transform .2s, background .2s, border-color .2s;
}
.pill:hover { box-shadow:var(--shadow-btn-h); color:var(--text); }
.pill:active { transform:scale(0.92); transition:transform .08s cubic-bezier(.4,0,.2,1); }
.pill.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 4px 14px rgba(79,70,229,0.32), 0 1px 3px rgba(79,70,229,0.20); }

/* ═══════════════════════════════
   WEEK CARDS
═══════════════════════════════ */
.week-list { display:flex; flex-direction:column; gap:8px; }
.week-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-card);
  box-shadow:var(--shadow-sm);
  overflow:hidden;
  transition:box-shadow .25s, transform .2s, border-color .25s;
}
.week-card.hidden { display:none; }
.week-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); border-color:var(--border-hi); }
.week-card.open  { box-shadow:var(--shadow-md); border-color:var(--border-hi); }

/* ── STATUS: IN PROGRESS ── */
.week-card.wp-inprogress {
  box-shadow:inset 4px 0 0 var(--accent), var(--shadow-sm);
  background:linear-gradient(to right, var(--accent-soft) 0%, var(--surface) 60%);
}
.week-card.wp-inprogress:hover {
  box-shadow:inset 4px 0 0 var(--accent), var(--shadow-md);
}
.week-card.wp-inprogress.open {
  box-shadow:inset 4px 0 0 var(--accent), var(--shadow-md);
}
/* ── STATUS: MASTERED ── */
.week-card.wp-mastered {
  box-shadow:inset 4px 0 0 var(--green), var(--shadow-sm);
  background:linear-gradient(to right, var(--green-soft) 0%, var(--surface) 60%);
}
.week-card.wp-mastered:hover {
  box-shadow:inset 4px 0 0 var(--green), var(--shadow-md);
}
.week-card.wp-mastered.open {
  box-shadow:inset 4px 0 0 var(--green), var(--shadow-md);
}
.week-card.wp-mastered .wtitle { text-decoration:line-through; color:var(--text-3); }
.week-card.wp-mastered .wnum  { color:var(--green); }
.week-card.wp-inprogress .wnum { color:var(--accent); }
body.dark .week-card.wp-inprogress .wnum { color:#818cf8; }

/* week head */
.week-head {
  display:flex; align-items:center; gap:16px;
  padding:18px 22px; cursor:pointer; user-select:none;
  transition:background .2s;
}
.week-head:hover { background:var(--surface-2); }
.week-head:active { transform:scale(0.997); transition:transform .08s cubic-bezier(.4,0,.2,1); }

.wnum { font-size:28px; font-weight:300; line-height:1; color:var(--text-4); min-width:44px; flex-shrink:0; font-variant-numeric:tabular-nums; transition:color .25s; }
.wmeta { flex:1; min-width:0; }
.wtitle { font-size:17px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; margin-bottom:5px; transition:color .25s; }
.wtags { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.tag { font-size:14px; color:var(--text-3); }
.tag.phase { font-weight:600; color:var(--text-3); }
.tag.lv { padding:3px 12px; border-radius:var(--r-btn); font-size:12px; font-weight:600; border:1px solid; }
.wchev { font-size:11px; color:var(--text-4); flex-shrink:0; transition:transform .25s cubic-bezier(.4,0,.2,1); }
.week-card.open .wchev { transform:rotate(90deg); }

/* mastered corner badge */
.wnum-wrap { position:relative; }
.wbadge {
  position:absolute; top:-6px; right:-2px;
  font-size:11px; font-weight:700; color:var(--green);
  display:none;
}
.week-card.wp-mastered .wbadge { display:block; }

/* expanded body */
.wbody { display:none; border-top:1px solid var(--border); }
.week-card.open .wbody { display:block; }

.wgoal {
  margin:18px 22px 0; padding:14px 18px;
  border-radius:var(--r-inner);
  background:var(--surface-2);
  border:1px solid var(--border);
  font-size:15px; color:var(--text-2); line-height:1.7;
}
.glabel { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text-4); margin-bottom:6px; }

/* ═══════════════════════════════
   TABS + TRANSITION
═══════════════════════════════ */
.tbar { display:flex; margin:16px 22px 0; border-bottom:1px solid var(--border); }
.tbtn {
  padding:10px 16px; font-size:13px; font-weight:600;
  letter-spacing:.5px; text-transform:uppercase;
  color:var(--text-3); background:none; border:none;
  border-bottom:2px solid transparent; margin-bottom:-1px;
  cursor:pointer; font-family:inherit;
  transition:color .2s, border-color .2s;
}
.tbtn:hover { color:var(--text-2); }
.tbtn:active { transform:scale(0.96); transition:transform .08s cubic-bezier(.4,0,.2,1); }
.tbtn.active { color:var(--text); border-bottom-color:var(--accent); }

.tcontent { display:none; padding:18px 22px 24px; }
.tcontent.active { display:block; }

/* TAB FADE — fires on every content swap because node is replaced */
@keyframes tabFadeIn {
  from { opacity:0; transform:translateY(7px); }
  to   { opacity:1; transform:translateY(0); }
}
.tab-panel { animation:tabFadeIn 0.22s ease forwards; }

/* ═══════════════════════════════
   BUTTONS — single border only
═══════════════════════════════ */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  min-height:40px; padding:9px 22px; border-radius:var(--r-btn);
  font-size:14px; font-weight:600; letter-spacing:.2px;
  cursor:pointer;
  background:var(--surface);
  border:1px solid var(--border-hi);
  box-shadow:var(--shadow-btn);
  color:var(--text-2); font-family:inherit; white-space:nowrap;
  transition:box-shadow .25s, background .2s, color .2s, transform .2s;
}
.btn:hover { box-shadow:var(--shadow-btn-h); color:var(--text); background:var(--surface-2); }
.btn:active { transform:scale(0.91); transition:transform .08s cubic-bezier(.4,0,.2,1); }

.btn-a {
  background:var(--accent); border-color:var(--accent); color:#fff;
  box-shadow:0 2px 6px rgba(79,70,229,0.30), 0 1px 2px rgba(79,70,229,0.20);
}
.btn-a:hover { background:#4338ca; border-color:#4338ca; color:#fff;
  box-shadow:0 4px 14px rgba(79,70,229,0.40), 0 2px 4px rgba(79,70,229,0.25); }

.btn-d {
  background:rgba(220,38,38,0.07); border-color:rgba(220,38,38,0.22); color:#dc2626;
  box-shadow:0 1px 3px rgba(220,38,38,0.10);
}
.btn-d:hover { background:rgba(220,38,38,0.13); box-shadow:0 3px 10px rgba(220,38,38,0.18); color:#b91c1c; }
body.dark .btn-d { color:#fca5a5; }

.btn-g { background:var(--surface); border-color:var(--border-hi); color:var(--text-2); }

/* btn-group — outer wrapper has NO border; inner btns keep their own single border */
.btn-group {
  display:inline-flex; align-items:center; gap:6px;
  /* No border, no shadow here — buttons speak for themselves */
}
/* remove inner shadow/border duplication inside groups */
.btn-group .btn { box-shadow:var(--shadow-btn); }

/* ═══════════════════════════════
   RESOURCES
═══════════════════════════════ */
.rlist { display:flex; flex-direction:column; gap:10px; }
.ritem { border-radius:var(--r-inner); overflow:hidden; background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow-sm); }
.rrow { display:flex; align-items:flex-start; gap:14px; padding:15px 18px; }
.rtype {
  font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  padding:4px 12px; border-radius:var(--r-btn);
  background:var(--surface-2); color:var(--text-2);
  border:1px solid var(--border);
  box-shadow:var(--shadow-btn);
  white-space:nowrap; flex-shrink:0; margin-top:2px;
}
.rinfo { flex:1; min-width:0; }
.rname { font-size:15px; font-weight:600; color:var(--text); line-height:1.35; }
.rauthor { font-size:13px; color:var(--text-4); font-style:italic; margin-top:3px; }
.rdesc { font-size:14px; color:var(--text-3); margin-top:4px; line-height:1.55; }
.pdf-strip {
  padding:12px 18px; background:var(--surface-2);
  border-top:1px solid var(--border);
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
}
.pdf-label { font-size:14px; color:var(--text-3); }
.pdf-fname { font-size:14px; color:var(--text-2); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500; }

.psec { margin-top:20px; }
.slabel { font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text-4); margin-bottom:10px; }
.pitem { display:flex; align-items:flex-start; gap:12px; padding:12px 16px; border-radius:var(--r-inner); background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow-sm); margin-bottom:8px; }
.psrc { font-size:12px; font-weight:700; color:var(--accent); white-space:nowrap; padding-top:2px; flex-shrink:0; }
body.dark .psrc { color:#818cf8; }
.ptask { font-size:14px; color:var(--text-2); flex:1; line-height:1.55; }
.plink {
  font-size:13px; font-weight:600; color:var(--text-2);
  text-decoration:none; flex-shrink:0; align-self:center;
  padding:6px 16px; border-radius:var(--r-btn);
  background:var(--surface); border:1px solid var(--border-hi);
  box-shadow:var(--shadow-btn);
  transition:box-shadow .25s, background .2s, color .2s;
}
.plink:hover { box-shadow:var(--shadow-btn-h); color:var(--text); }
.plink:active { transform:scale(0.91); transition:transform .08s cubic-bezier(.4,0,.2,1); }

/* ═══════════════════════════════
   LINKS TAB
═══════════════════════════════ */
.llist { display:flex; flex-direction:column; gap:8px; }
.litem {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px; border-radius:var(--r-inner);
  background:var(--surface); border:1px solid var(--border);
  box-shadow:var(--shadow-sm);
  text-decoration:none;
  transition:box-shadow .22s ease, transform .22s ease, background .22s ease;
}

/* ── STATE ── */
const LS='cmp-v10', LSP='cmp-v10-pdfs';
let S={expanded:null,filter:0,checks:{},notes:{},pdfs:{},tabs:{},costOpen:false,modalWeek:null};
function loadState(){try{const r=localStorage.getItem(LS);if(r)S={...S,...JSON.parse(r)};}catch(e){}try{const p=localStorage.getItem(LSP);if(p)S.pdfs=JSON.parse(p);}catch(e){}}
function saveState(){try{const{pdfs,...r}=S;localStorage.setItem(LS,JSON.stringify(r));}catch(e){}try{localStorage.setItem(LSP,JSON.stringify(S.pdfs));}catch(e){}}

/* ── THEME ── */
let isDark=false;
function initTheme(){const s=localStorage.getItem('cmp-v10-theme');isDark=s?s==='dark':false;applyTheme();}
function applyTheme(){
  document.body.classList.toggle('dark',isDark);
  const lbl=document.getElementById('theme-label');
  if(lbl)lbl.textContent=isDark?'Light mode':'Dark mode';
  const icon=document.querySelector('#theme-toolbar-btn .toolbar-btn-icon');
  if(icon)icon.textContent=isDark?'\u2600\ufe0f':'\ud83c\udf19';
}
function toggleTheme(){isDark=!isDark;localStorage.setItem('cmp-v10-theme',isDark?'dark':'light');applyTheme();}

/* ── TOOLBAR ── */
let toolbarOpen=false;
function toggleToolbar(){
  toolbarOpen=!toolbarOpen;
  document.getElementById('toolbar-panel').classList.toggle('open',toolbarOpen);
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#toolbar-toggle')&&!e.target.closest('#toolbar-panel')){
    toolbarOpen=false;
    const p=document.getElementById('toolbar-panel');if(p)p.classList.remove('open');
  }
});

/* ── MOBILE ── */
let isMobile=window.innerWidth<768;
window.addEventListener('resize',()=>{const was=isMobile;isMobile=window.innerWidth<768;if(was!==isMobile){S.modalWeek=null;S.expanded=null;document.body.classList.remove('modal-open');render();}},{passive:true});

/* ── HELPERS ── */
PHASES.forEach(ph=>{ph.weeks=W.filter(w=>w.phase===ph.id).map(w=>w.week);});
const phOf=n=>PHASES.find(p=>p.weeks.includes(n))||PHASES[0];
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function getScore(wn){const w=W.find(x=>x.week===wn);if(!w)return{s:0,t:0};return{s:w.checks.reduce((a,_,i)=>a+(S.checks[`${wn}-${i}`]?1:0),0),t:w.checks.length};}
function lvInfo(s,t){const p=t?s/t:0;if(!p)return{l:'Not started',c:'var(--text-4)'};if(p<.4)return{l:'Novice',c:'#be185d'};if(p<.7)return{l:'Developing',c:'#d97706'};if(p<1)return{l:'Solid',c:'#0284c7'};return{l:'Mastered',c:'#059669'};}
const masteredCount=()=>W.filter(w=>{const{s,t}=getScore(w.week);return s===t&&t>0;}).length;

/* ── PDF ── */
function openPdf(bk){const pdf=S.pdfs[bk];if(!pdf)return;try{const arr=pdf.url.split(','),bs=atob(arr[1]);let n=bs.length;const u8=new Uint8Array(n);while(n--)u8[n]=bs.charCodeAt(n);const blob=new Blob([u8],{type:'application/pdf'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.target='_blank';a.rel='noopener';document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);}catch(e){alert('Could not open PDF.\n'+e.message);}}

/* ── TOAST ── */
let _tt=null;
function showToast(msg){const t=document.getElementById('toast'),tx=document.getElementById('toast-text');if(!t||!tx)return;tx.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2600);}

/* ── EXPORT NOTES ── */
function exportNotes(){
  const lines=W.map(w=>{const v=S.notes[w.week];return v?`## Week ${w.week}: ${w.title}\n\n${v}\n`:null;}).filter(Boolean);
  if(!lines.length){showToast('No notes to export');return;}
  const blob=new Blob([lines.join('\n---\n\n')],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='crypto-notes.txt';document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
  showToast('Notes exported');
  toolbarOpen=false;document.getElementById('toolbar-panel').classList.remove('open');
}

/* ── COPY NOTE ── */
function copyNote(wn){
  const v=S.notes[wn]||'';
  if(!v){showToast('No note to copy');return;}
  navigator.clipboard.writeText(v).then(()=>showToast('Note copied')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=v;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Note copied');
  });
}

    let strip='';
    if(r.bookKey){strip=`<div class="pdf-strip">${pdf
      ?`<span class="pdf-fname">${esc(pdf.name)}</span><div class="btn-group"><button class="btn btn-a" onclick="openPdf('${r.bookKey}')">Open PDF</button><button class="btn btn-d" onclick="removePdf('${r.bookKey}')">Remove</button></div>`
      :`<span class="pdf-label">Attach your copy:</span><div class="btn-group"><button class="btn" onclick="triggerUpload('${r.bookKey}')">Upload PDF</button>${r.link?`<a href="${r.link}" target="_blank" rel="noopener" class="btn btn-g" style="text-decoration:none">Free online</a>`:''}</div><input type="file" accept=".pdf" id="fi-${r.bookKey}" style="display:none" onchange="handleUpload('${r.bookKey}',this)">`
    }</div>`;}
    else if(r.link){strip=`<div class="pdf-strip"><div class="btn-group"><a href="${r.link}" target="_blank" rel="noopener" class="btn btn-g" style="text-decoration:none">Open resource</a></div></div>`;}
    return`<div class="ritem"><div class="rrow"><span class="rtype">${r.type}</span><div class="rinfo"><div class="rname">${esc(r.name)}</div>${r.author?`<div class="rauthor">${esc(r.author)}</div>`:''}<div class="rdesc">${esc(r.detail)}</div></div></div>${strip}</div>`;
  }).join('');
  const practice=w.practice.map(p=>`<div class="pitem"><span class="psrc">${esc(p.source)}</span><span class="ptask">${esc(p.task)}</span>${p.link?`<a href="${p.link}" target="_blank" rel="noopener" class="plink">Visit</a>`:''}</div>`).join('');
  return`<div class="tab-panel"><div class="rlist">${items}</div><div class="psec"><div class="slabel">Practice & Exercises</div>${practice}</div></div>`;
}

function renderLinks(w){
  return`<div class="tab-panel"><div class="slabel" style="margin-bottom:12px">Free Links & References</div><div class="llist">${w.links.map(l=>`<a href="${l.url}" target="_blank" rel="noopener" class="litem"><span class="lname"><span class="larrow">&#8599;</span>${esc(l.name)}</span><span class="ldomain">${l.url.replace('https://','').split('/')[0]}</span></a>`).join('')}</div></div>`;
}

function renderNotes(w){
  const v=S.notes[w.week]||'';
  return`<div class="tab-panel"><div class="nhead"><div class="slabel">Personal Notes</div><span class="ncount">${v.length} chars</span></div>
    <textarea class="narea" id="na-${w.week}" placeholder="Add your observations, questions, key insights, and things to revisit.&#10;&#10;This is your space." oninput="saveNote(${w.week},this.value)">${esc(v)}</textarea>
    <div class="nact">
      ${v?`<button class="btn btn-g" onclick="copyNote(${w.week})">Copy note</button>`:''}
      ${v?`<button class="btn btn-g" onclick="clearNote(${w.week})">Clear</button>`:''}
    </div></div>`;
}

function renderLevel(w){
  const{s,t}=getScore(w.week),info=lvInfo(s,t),done=s===t&&t>0;
  return`<div class="tab-panel"><div class="lvbadge"><div><div class="lvlabel">Current Level</div><div class="lvname" style="color:${info.c}">${info.l}</div></div><div class="lvfrac">${s}<small>/${t}</small></div></div>
    <div class="lvtrack"><div class="lvbar" style="width:${t?s/t*100:0}%;background:${info.c}"></div></div>
    <div class="slabel" style="margin-bottom:10px">Check what you can genuinely do</div>
    <div class="cklist">${w.checks.map((q,qi)=>{const on=!!S.checks[`${w.week}-${qi}`];return`<button class="ckitem ${on?'on':''}" data-wn="${w.week}" data-qi="${qi}" onclick="toggleCheck(${w.week},${qi})"><div class="ckbox"><span class="cktick">&#10003;</span></div><span class="cktxt">${esc(q)}</span></button>`;}).join('')}</div>
    ${done?`<div class="mastered-note">Week ${w.week} complete — ready to advance.</div>`:''}</div>`;
}

const TAB_ORDER=['resources','links','notes','level'];
const TAB_LABELS=['Resources','Links','Notes','Level'];
function tabContent(w,tab){
  if(tab==='resources')return renderResources(w);
  if(tab==='links')return renderLinks(w);
  if(tab==='notes')return renderNotes(w);
  if(tab==='level')return renderLevel(w);
  return'';
}

/* ── CARD RENDER ── */
function cardStatusClass(wn){const{s,t}=getScore(wn);if(!t||!s)return'';if(s===t)return'wp-mastered';return'wp-inprogress';}

function renderCard(w){
  const ph=phOf(w.week),{s,t}=getScore(w.week),info=lvInfo(s,t);
  const done=s===t&&t>0, inProg=s>0&&s<t;
  const open=!isMobile&&S.expanded===w.week;
  const hidden=S.filter!==0&&S.filter!==w.phase;
  const tab=S.tabs[w.week]||'resources';
  const fn=isMobile?`openModal(${w.week})`:`toggleWeek(${w.week})`;
  const sc=cardStatusClass(w.week);
  return`<div class="week-card ${open?'open':''} ${sc} ${hidden?'hidden':''}" id="wc-${w.week}" data-phase="${w.phase}">
    <div class="week-head" onclick="${fn}">
      <div class="wnum-wrap">
        <div class="wnum">${String(w.week).padStart(2,'0')}</div>
        <div class="wbadge">&#10003;</div>
      </div>
      <div class="wmeta">
        <div class="wtitle">${esc(w.title)}</div>
        <div class="wtags">
          <span class="tag phase">${ph.label}</span>
          <span class="tag">&middot;</span>
          <span class="tag">${w.hours}h</span>
          ${s>0?`<span class="tag">&middot;</span><span class="tag lv" style="color:${info.c};border-color:${info.c}44;background:${info.c}10">${info.l}</span>`:''}
        </div>
      </div>
      <span class="wchev">&#9654;</span>
    </div>
    ${open?`<div class="wbody">
      <div class="wgoal"><div class="glabel">Weekly Goal</div>${esc(w.goal)}</div>
      <div class="tbar">${TAB_ORDER.map((id,i)=>`<button class="tbtn ${tab===id?'active':''}" onclick="switchTab(${w.week},'${id}')">${TAB_LABELS[i]}</button>`).join('')}</div>
      <div class="tcontent active">${tabContent(w,tab)}</div>
    </div>`:''}
  </div>`;
}

/* ── MAIN RENDER ── */
function render(){
  const m=masteredCount(),h=W.reduce((a,w)=>a+w.hours,0);
  document.getElementById('app').innerHTML=`
    <div class="header">
      <div class="eyebrow">A structured programme &middot; 24 weeks</div>
      <h1 class="main-title">Cryptography<br>Mastery Plan</h1>
      <p class="sub-title">Mid-Level to Advanced — from classical ciphers to post-quantum standards.</p>
    </div>
    <div class="stats-grid">
      ${[['24','Weeks'],[h+'h','Study Hours'],['$283','Books (max)'],[m+'/24','Mastered']].map(([v,l])=>`<div class="stat-card"><div class="sv">${v}</div><div class="sl">${l}</div></div>`).join('')}
    </div>
    <div class="prog-card">
      <div class="prog-meta"><span>Overall Progress</span><span>${Math.round(m/24*100)}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${m/24*100}%"></div></div>
    </div>
    <div class="cost-card">
      <div class="cost-head" onclick="toggleCost()">
        <span class="cost-head-label">Cost Overview</span>
        <span class="cost-icon ${S.costOpen?'open':''}">&#9660;</span>
      </div>
      <div class="cost-body ${S.costOpen?'open':''}">
        <div class="cost-grid">
          ${[['The Code Book (Singh)','$13'],['Serious Cryptography (Aumasson)','$45'],['Understanding Cryptography (Paar)','$55'],['Real-World Cryptography (Wong)','$55'],['The Joy of Cryptography (Rosulek)','Free'],['Math Cryptography (Hoffstein)','$70'],['Moon Math Manual','Free'],['Coursera Crypto I — cert (opt.)','$49'],['Coursera Crypto II — cert (opt.)','$49']].map(([n,p])=>`<div class="cost-row"><span>${n}</span><span>${p}</span></div>`).join('')}
        </div>
        <p class="cost-total">Paid books: <strong>$283</strong> &nbsp;&middot;&nbsp; With certs: <strong>$381</strong> &nbsp;&middot;&nbsp; Three books are <span class="free-hi">completely free</span>.</p>
      </div>
    </div>
    <div class="filter-wrap">
      <div class="filter-label">Filter by Phase</div>
      <div class="pill-row">
        <button class="pill ${S.filter===0?'active':''}" data-id="0" onclick="setFilter(0)">All</button>
        ${PHASES.map(p=>`<button class="pill ${S.filter===p.id?'active':''}" data-id="${p.id}" onclick="setFilter(${p.id})">${p.label}</button>`).join('')}
      </div>
    </div>
    <div class="week-list">${W.map(renderCard).join('')}</div>
    <div class="footer">
      <span>Cryptography Mastery Plan &middot; 24 Weeks &middot; ${h}h</span>
      <span>${m} of 24 weeks mastered</span>
    </div>`;
  if(isMobile)renderMobileNav();
}

/* ── MOBILE NAV ── */
function renderMobileNav(){
  document.getElementById('mobile-nav').innerHTML=`<div class="mnav-track">
    <button class="mnav-pill ${S.filter===0?'active':''}" data-id="0" onclick="setFilter(0)">All</button>
    ${PHASES.map(p=>`<button class="mnav-pill ${S.filter===p.id?'active':''}" data-id="${p.id}" onclick="setFilter(${p.id})">${p.label}</button>`).join('')}
  </div>`;
}

/* ── MODAL ── */
function openModal(wn){
  if(!S.tabs[wn])S.tabs[wn]='resources';
  S.modalWeek=wn;saveState();
  document.body.classList.add('modal-open');
  renderModal();
}
function closeModal(){
  S.modalWeek=null;saveState();
  document.body.classList.remove('modal-open');
  document.getElementById('modal-root').innerHTML='';
  W.forEach(w=>updateCardInList(w.week));
}
function renderModal(){
  const root=document.getElementById('modal-root');
  if(!S.modalWeek){root.innerHTML='';return;}
  const w=W.find(x=>x.week===S.modalWeek),ph=phOf(w.week);
  const tab=S.tabs[w.week]||'resources';
  root.innerHTML=`<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal-card" id="modal-card" onclick="event.stopPropagation()">
      ${closeBtn}
      <div class="modal-sticky">
        <div class="modal-wnum">Week ${String(w.week).padStart(2,'0')} &nbsp;&middot;&nbsp; ${ph.label} &nbsp;&middot;&nbsp; ${w.hours}h</div>
        <div class="modal-wtitle">${esc(w.title)}</div>
      </div>
      <div class="modal-goal"><div class="modal-glabel">Weekly Goal</div>${esc(w.goal)}</div>
      <div class="modal-tbar" id="modal-tbar">
        ${TAB_ORDER.map((id,i)=>`<button class="tbtn ${tab===id?'active':''}" onclick="mSwitchTab(${w.week},'${id}')">${TAB_LABELS[i]}</button>`).join('')}
      </div>
      <div class="modal-body" id="modal-body">
        ${tabContent(w,tab)}
        <div class="tab-dots">${TAB_ORDER.map(id=>`<div class="tab-dot ${tab===id?'active':''}"></div>`).join('')}</div>
      </div>
    </div>
  </div>`;
  requestAnimationFrame(()=>attachSwipe());
}
function handleOverlayClick(e){if(e.target.id==='modal-overlay')closeModal();}

function updateModalBody(){
  const body=document.getElementById('modal-body');
  if(!body||!S.modalWeek)return;
  const w=W.find(x=>x.week===S.modalWeek);
  const tab=S.tabs[w.week]||'resources';
  body.innerHTML=`${tabContent(w,tab)}<div class="tab-dots">${TAB_ORDER.map(id=>`<div class="tab-dot ${tab===id?'active':''}"></div>`).join('')}</div>`;
  body.scrollTop=0;
}

/* ── SWIPE ── */
function attachSwipe(){
  const body=document.getElementById('modal-body');if(!body)return;
  let g={dir:'idle',sx:0,sy:0};
  body.addEventListener('touchstart',e=>{g.dir='deciding';g.sx=e.touches[0].clientX;g.sy=e.touches[0].clientY;},{passive:true});
  body.addEventListener('touchmove',e=>{
    if(g.dir==='vertical'||g.dir==='idle')return;
    const dx=e.touches[0].clientX-g.sx,dy=e.touches[0].clientY-g.sy;
    if(g.dir==='deciding'){if(Math.abs(dx)>10||Math.abs(dy)>10)g.dir=Math.abs(dx)>Math.abs(dy)*1.6?'horizontal':'vertical';return;}
    if(g.dir==='horizontal')e.preventDefault();
  },{passive:false});
  body.addEventListener('touchend',e=>{
    if(g.dir!=='horizontal'){g.dir='idle';return;}
    const dx=e.changedTouches[0].clientX-g.sx;g.dir='idle';
    if(Math.abs(dx)<44)return;
    if(navigator.vibrate)navigator.vibrate(8);
    const cur=S.tabs[S.modalWeek]||'resources',idx=TAB_ORDER.indexOf(cur);
    if(dx<0&&idx<TAB_ORDER.length-1)mSwitchTab(S.modalWeek,TAB_ORDER[idx+1]);
    else if(dx>0&&idx>0)mSwitchTab(S.modalWeek,TAB_ORDER[idx-1]);
  },{passive:true});
}

/* ── ACTIONS ── */
function toggleWeek(n){
  if(isMobile){openModal(n);return;}
  S.expanded=S.expanded===n?null:n;
  if(!S.tabs[n])S.tabs[n]='resources';
  saveState();render();
  if(S.expanded===n)setTimeout(()=>document.getElementById('wc-'+n)?.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}
function switchTab(wn,t){S.tabs[wn]=t;saveState();render();}
function mSwitchTab(wn,t){
  S.tabs[wn]=t;saveState();
  document.querySelectorAll('#modal-tbar .tbtn').forEach((btn,i)=>btn.classList.toggle('active',TAB_ORDER[i]===t));
  updateModalBody();
}
function setFilter(id){
  S.filter=id;saveState();
  document.querySelectorAll('[data-id]').forEach(el=>el.classList.toggle('active',+el.dataset.id===id));
  document.querySelectorAll('.week-card[data-phase]').forEach(card=>card.classList.toggle('hidden',id!==0&&+card.dataset.phase!==id));
}
function toggleCost(){S.costOpen=!S.costOpen;saveState();render();}

function toggleCheck(wn,qi){
  const key=`${wn}-${qi}`;S.checks[key]=!S.checks[key];saveState();
  if(navigator.vibrate)navigator.vibrate(S.checks[key]?[8,0,8]:6);
  if(S.modalWeek===wn){
    const item=document.querySelector(`[data-wn="${wn}"][data-qi="${qi}"]`);
    if(item){item.classList.toggle('on',!!S.checks[key]);const box=item.querySelector('.ckbox');if(box){box.classList.remove('pop');void box.offsetWidth;box.classList.add('pop');box.addEventListener('animationend',()=>box.classList.remove('pop'),{once:true});}}
    const{s,t}=getScore(wn),info=lvInfo(s,t);
    const ln=document.querySelector('.lvname'),lf=document.querySelector('.lvfrac'),lb=document.querySelector('.lvbar');
    if(ln){ln.textContent=info.l;ln.style.color=info.c;}
    if(lf)lf.innerHTML=`${s}<small>/${t}</small>`;
    if(lb){lb.style.width=`${t?s/t*100:0}%`;lb.style.background=info.c;}
    const done=s===t&&t>0,existing=document.querySelector('.mastered-note');
    if(done&&!existing){const ck=document.querySelector('.cklist');if(ck){const el=document.createElement('div');el.className='mastered-note';el.textContent=`Week ${wn} complete — ready to advance.`;ck.insertAdjacentElement('afterend',el);}showToast('Week '+wn+' mastered');}
    else if(!done&&existing){existing.remove();}
    updateCardInList(wn);updateProgressBar();
  }else{render();}
}

function saveNote(wn,v){S.notes[wn]=v;saveState();const c=document.querySelector('.ncount');if(c)c.textContent=v.length+' chars';}
function clearNote(wn){S.notes[wn]='';saveState();if(S.modalWeek===wn)updateModalBody();else render();}
function triggerUpload(bk){document.getElementById('fi-'+bk)?.click();}
function handleUpload(bk,inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{S.pdfs[bk]={name:f.name,url:e.target.result};saveState();if(S.modalWeek)updateModalBody();else render();};r.readAsDataURL(f);}
function removePdf(bk){delete S.pdfs[bk];saveState();if(S.modalWeek)updateModalBody();else render();}

function updateCardInList(wn){const el=document.getElementById('wc-'+wn);if(!el)return;const div=document.createElement('div');div.innerHTML=renderCard(W.find(x=>x.week===wn));el.replaceWith(div.firstElementChild);}
function updateProgressBar(){const m=masteredCount();const fill=document.querySelector('.prog-fill'),pct=document.querySelectorAll('.prog-meta span')[1],sv=document.querySelectorAll('.sv')[3];if(fill)fill.style.width=`${m/24*100}%`;if(pct)pct.textContent=`${Math.round(m/24*100)}%`;if(sv)sv.textContent=`${m}/24`;}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(!S.modalWeek)return;
  if(e.key==='Escape'){closeModal();return;}
  if(e.key==='ArrowRight'||e.key==='ArrowLeft'){
    const cur=S.tabs[S.modalWeek]||'resources',idx=TAB_ORDER.indexOf(cur);
    if(e.key==='ArrowRight'&&idx<TAB_ORDER.length-1)mSwitchTab(S.modalWeek,TAB_ORDER[idx+1]);
    if(e.key==='ArrowLeft'&&idx>0)mSwitchTab(S.modalWeek,TAB_ORDER[idx-1]);
  }
});

/* ── BOOT ── */
loadState();initTheme();render();
</script>
</body>
