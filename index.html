<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Cryptography Mastery Plan</title>
<style>
/* ══════════════════════════════════════
   CSS VARIABLES — DARK / LIGHT
══════════════════════════════════════ */
:root {
  --bg:        #0c0f1a;
  --surface:   #131726;
  --surface-2: #1b2035;
  --surface-3: #232944;
  --border:    rgba(255,255,255,.07);
  --border-hi: rgba(255,255,255,.13);
  --text:      #e8ecf5;
  --text-2:    #8892a6;
  --text-3:    #505a72;
  --shadow-sm: 0 1px 8px rgba(0,0,0,.35);
  --shadow-md: 0 4px 24px rgba(0,0,0,.45);
  --shadow-lg: 0 14px 56px rgba(0,0,0,.6);
  --prog-bg:   linear-gradient(90deg,#6366f1,#8b5cf6);
  --r-card:    16px;
  --r-inner:   10px;
  --accent:    #6366f1;
  color-scheme: dark;
}
body.light {
  --bg:        #edf0f8;
  --surface:   #ffffff;
  --surface-2: #f4f5fc;
  --surface-3: #e8ebf5;
  --border:    rgba(0,0,0,.07);
  --border-hi: rgba(0,0,0,.14);
  --text:      #181a2a;
  --text-2:    #4b5568;
  --text-3:    #9ca3b4;
  --shadow-sm: 0 1px 8px rgba(0,0,0,.07);
  --shadow-md: 0 4px 24px rgba(0,0,0,.1);
  --shadow-lg: 0 14px 56px rgba(0,0,0,.14);
  color-scheme: light;
}

/* ══════════════════════════════════════
   RESET & BASE
══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent;}
body{
  min-height:100vh;
  font-family:system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.6;
  color:var(--text);background:var(--bg);
  overflow-x:hidden;transition:background .25s,color .25s;
}
/* Scroll lock when modal open */
body.modal-open{overflow:hidden;}

/* ══════════════════════════════════════
   THEME TOGGLE
══════════════════════════════════════ */
#theme-btn{
  position:fixed;top:16px;left:16px;z-index:999;
  width:48px;height:48px;border-radius:50%;
  background:var(--surface);border:1px solid var(--border-hi);
  color:var(--text-2);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-md);
  transition:background .2s,color .2s,transform .15s;
}
#theme-btn:hover{color:var(--text);background:var(--surface-2);}
#theme-btn:active{transform:scale(.88);}

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
.page{max-width:860px;margin:0 auto;padding:56px 20px 80px;}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
.header{margin-bottom:36px;padding-right:60px;}
.eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;font-weight:500;}
.main-title{font-size:clamp(30px,6vw,46px);font-weight:800;line-height:1.12;letter-spacing:-1px;color:var(--text);margin-bottom:8px;}
.sub-title{font-size:clamp(13px,2vw,15px);color:var(--text-2);font-weight:400;}

/* ══════════════════════════════════════
   STATS
══════════════════════════════════════ */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:16px 14px;text-align:center;box-shadow:var(--shadow-sm);}
.sv{font-size:clamp(18px,3.5vw,24px);font-weight:700;color:var(--text);line-height:1;}
.sl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);margin-top:5px;}

/* ══════════════════════════════════════
   PROGRESS
══════════════════════════════════════ */
.prog-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:16px 20px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-2);margin-bottom:10px;}
.prog-track{height:4px;background:var(--border-hi);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;background:var(--prog-bg);transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ══════════════════════════════════════
   COST BOX
══════════════════════════════════════ */
.cost-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);margin-bottom:20px;overflow:hidden;box-shadow:var(--shadow-sm);}
.cost-head{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;transition:background .15s;}
.cost-head:hover{background:var(--surface-2);}
.cost-head-label{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-2);}
.cost-icon{font-size:11px;color:var(--text-3);transition:transform .22s;}
.cost-icon.open{transform:rotate(180deg);}
.cost-body{padding:0 20px 18px;display:none;}
.cost-body.open{display:block;}
.cost-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:0 24px;margin-top:6px;margin-bottom:12px;}
.cost-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text-2);padding:6px 0;border-bottom:1px solid var(--border);gap:8px;}
.cost-row:last-child{border-bottom:none;}
.cost-row span:last-child{font-family:'Courier New',monospace;color:var(--text);white-space:nowrap;}
.cost-total{font-size:12px;color:var(--text-3);padding-top:10px;border-top:1px solid var(--border);}
.cost-total strong{color:var(--text);}
.free-hi{color:#6ee7b7;}

/* ══════════════════════════════════════
   FILTER PILLS (desktop)
══════════════════════════════════════ */
.filter-wrap{margin-bottom:22px;}
.filter-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;}
.pill-row{display:flex;flex-wrap:wrap;gap:7px;}
.pill{padding:6px 16px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border-hi);color:var(--text-2);background:var(--surface);transition:all .15s;box-shadow:var(--shadow-sm);}
.pill:hover{background:var(--surface-2);color:var(--text);}
.pill:active{transform:scale(.93);}
.pill.active{background:var(--text);color:var(--bg);border-color:var(--text);}

/* ══════════════════════════════════════
   WEEK CARDS (list)
══════════════════════════════════════ */
.week-list{display:flex;flex-direction:column;gap:8px;}
.week-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-card);overflow:hidden;
  box-shadow:var(--shadow-sm);
  transition:box-shadow .2s,transform .15s,border-color .2s;
}
.week-card.hidden{display:none;}
.week-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.week-card.open{box-shadow:var(--shadow-md);border-color:var(--border-hi);}

.week-head{
  display:flex;align-items:center;gap:14px;padding:16px 20px;
  cursor:pointer;user-select:none;
  border-left:3px solid var(--pc,var(--accent));
  transition:background .15s;
}
.week-head:hover{background:var(--surface-2);}

/* ── PLAIN number — no phase color ── */
.wnum{
  font-size:22px;font-weight:800;line-height:1;
  color:var(--text-2);          /* plain, not --pc */
  min-width:34px;flex-shrink:0;
  font-variant-numeric:tabular-nums;
}
.wmeta{flex:1;min-width:0;}
.wtitle{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35;margin-bottom:4px;}
.week-card.mastered .wtitle{color:var(--text-3);text-decoration:line-through;}
.wtags{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.tag{font-size:11px;color:var(--text-3);letter-spacing:.3px;}
.tag.phase{color:var(--pc,var(--accent));font-weight:700;}
.tag.lv{padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;border:1px solid;}
.wchev{font-size:10px;color:var(--text-3);flex-shrink:0;transition:transform .22s cubic-bezier(.4,0,.2,1);}
.week-card.open .wchev{transform:rotate(90deg);}

/* desktop expanded body */
.wbody{display:none;border-top:1px solid var(--border);}
.week-card.open .wbody{display:block;}
.wgoal{margin:16px 20px 0;padding:12px 16px 12px 18px;border-left:3px solid var(--pc,var(--accent));border-radius:0 var(--r-inner) var(--r-inner) 0;background:var(--surface-2);font-size:13px;color:var(--text-2);line-height:1.7;}
.glabel{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--pc,var(--accent));margin-bottom:4px;}

/* ══════════════════════════════════════
   TABS
══════════════════════════════════════ */
.tbar{display:flex;margin:14px 20px 0;border-bottom:1px solid var(--border);}
.tbtn{padding:8px 14px;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text-3);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;font-family:inherit;transition:color .15s,border-color .15s;}
.tbtn:hover{color:var(--text-2);}
.tbtn:active{transform:scale(.95);}
.tbtn.active{color:var(--text);border-bottom-color:var(--pc,var(--accent));}
.tcontent{display:none;padding:16px 20px 22px;}
.tcontent.active{display:block;}

/* ══════════════════════════════════════
   RESOURCES
══════════════════════════════════════ */
.rlist{display:flex;flex-direction:column;gap:8px;}
.ritem{border-radius:var(--r-inner);overflow:hidden;background:var(--surface-2);border:1px solid var(--border);}
.rrow{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;}
.rtype{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:999px;background:var(--surface-3);color:var(--text-2);border:1px solid var(--border);white-space:nowrap;flex-shrink:0;margin-top:2px;}
.rinfo{flex:1;min-width:0;}
.rname{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;}
.rauthor{font-size:11px;color:var(--text-3);font-style:italic;margin-top:2px;}
.rdesc{font-size:12px;color:var(--text-2);margin-top:3px;line-height:1.5;}
.pdf-strip{padding:10px 15px;background:var(--surface-3);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.pdf-label{font-size:12px;color:var(--text-3);}
.pdf-fname{font-size:12px;color:var(--text-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.psec{margin-top:16px;}
.slabel{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:8px;}
.pitem{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:var(--r-inner);background:var(--surface-2);border:1px solid var(--border);margin-bottom:6px;}
.psrc{font-size:10px;font-weight:700;color:var(--pc,var(--accent));white-space:nowrap;padding-top:2px;flex-shrink:0;}
.ptask{font-size:12px;color:var(--text-2);flex:1;line-height:1.5;}
.plink{font-size:11px;font-weight:600;color:var(--pc,var(--accent));text-decoration:none;flex-shrink:0;align-self:center;padding:4px 12px;border-radius:999px;border:1px solid var(--border-hi);background:var(--surface-3);transition:background .15s,border-color .15s;}
.plink:hover{background:var(--surface-2);border-color:var(--pc,var(--accent));}

/* ══════════════════════════════════════
   BUTTONS
══════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;min-height:38px;padding:8px 20px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.4px;cursor:pointer;border:1px solid transparent;font-family:inherit;white-space:nowrap;transition:background .15s,filter .15s,border-color .15s;}
.btn:active{transform:scale(.92);}
.btn-p{background:var(--surface-2);border-color:var(--border-hi);color:var(--text);}
.btn-p:hover{background:var(--surface-3);}
.btn-a{background:var(--pc,var(--accent));border-color:var(--pc,var(--accent));color:#fff;}
.btn-a:hover{filter:brightness(1.12);}
.btn-g{background:transparent;border-color:var(--border-hi);color:var(--text-2);}
.btn-g:hover{background:var(--surface-2);color:var(--text);}
.btn-d{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.25);color:#fca5a5;}
.btn-d:hover{background:rgba(239,68,68,.18);}
.btn-group{display:inline-flex;align-items:center;gap:5px;background:var(--surface-3);border:1px solid var(--border-hi);border-radius:999px;padding:4px;}
.btn-group .btn{min-height:32px;padding:5px 14px;font-size:11px;}

/* ══════════════════════════════════════
   LINKS TAB
══════════════════════════════════════ */
.llist{display:flex;flex-direction:column;gap:6px;}
.litem{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:var(--r-inner);background:var(--surface-2);border:1px solid var(--border);text-decoration:none;transition:background .15s,transform .12s;}
.litem:hover{background:var(--surface-3);transform:translateX(3px);}
.litem:active{transform:scale(.98);}
.lname{font-size:13px;color:var(--text);display:flex;align-items:center;gap:9px;}
.larrow{color:var(--pc,var(--accent));font-size:13px;}
.ldomain{font-family:'Courier New',monospace;font-size:10px;color:var(--text-3);}

/* ══════════════════════════════════════
   NOTES
══════════════════════════════════════ */
.nhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.ncount{font-family:'Courier New',monospace;font-size:10px;color:var(--text-3);}
.narea{width:100%;min-height:140px;resize:vertical;background:var(--surface-2);border:1px solid var(--border-hi);border-radius:var(--r-inner);padding:12px 15px;font-size:13px;font-family:inherit;color:var(--text);line-height:1.7;outline:none;transition:border-color .2s,box-shadow .2s;}
.narea::placeholder{color:var(--text-3);font-style:italic;}
.narea:focus{border-color:var(--pc,var(--accent));box-shadow:0 0 0 3px rgba(99,102,241,.1);}
.nact{display:flex;justify-content:flex-end;margin-top:8px;}

/* ══════════════════════════════════════
   LEVEL CHECK
══════════════════════════════════════ */
.lvbadge{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-radius:var(--r-inner);background:var(--surface-2);border:1px solid var(--border);margin-bottom:12px;}
.lvlabel{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:4px;}
.lvname{font-size:17px;font-weight:700;}
.lvfrac{font-size:26px;font-weight:800;color:var(--text-2);line-height:1;}
.lvfrac small{font-size:14px;color:var(--text-3);}
.lvtrack{height:4px;background:var(--border-hi);border-radius:2px;overflow:hidden;margin-bottom:16px;}
.lvbar{height:100%;border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.cklist{display:flex;flex-direction:column;gap:6px;}
.ckitem{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:var(--r-inner);background:var(--surface-2);border:1px solid var(--border);border-left:2px solid transparent;cursor:pointer;text-align:left;width:100%;font-family:inherit;color:inherit;transition:background .15s,border-color .15s;}
.ckitem:hover{background:var(--surface-3);}
.ckitem:active{transform:scale(.98);}
.ckitem.on{background:var(--surface-3);border-left-color:var(--pc,var(--accent));border-color:var(--border-hi);}
.ckbox{width:20px;height:20px;border-radius:50%;border:2px solid var(--border-hi);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .18s cubic-bezier(.4,0,.2,1);}
.ckitem.on .ckbox{background:var(--pc,var(--accent));border-color:var(--pc,var(--accent));}
.cktick{display:none;color:#fff;font-size:11px;font-weight:800;line-height:1;}
.ckitem.on .cktick{display:block;}
.cktxt{font-size:12px;color:var(--text-2);line-height:1.6;transition:color .15s;}
.ckitem.on .cktxt{color:var(--text);}
.mastered-note{margin-top:12px;padding:10px 14px;border-radius:var(--r-inner);background:rgba(110,231,183,.08);border:1px solid rgba(110,231,183,.2);color:#6ee7b7;font-size:12px;text-align:center;font-style:italic;}

@keyframes ck-pop{
  0%  {transform:scale(1);}
  30% {transform:scale(1.45);}
  58% {transform:scale(.78);}
  78% {transform:scale(1.1);}
  100%{transform:scale(1);}
}
.ckbox.pop{animation:ck-pop .35s cubic-bezier(.4,0,.2,1) forwards;}

/* ══════════════════════════════════════
   FOOTER
══════════════════════════════════════ */
.footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:11px;color:var(--text-3);flex-wrap:wrap;gap:8px;letter-spacing:.5px;}

/* ══════════════════════════════════════
   MOBILE — BOTTOM NAV
   z-index: 400 — above the modal overlay (300) so it stays tappable
══════════════════════════════════════ */
#mobile-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:400;
  background:rgba(var(--nav-bg,13,15,26),.9);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-top:1px solid var(--border-hi);
  padding-bottom:env(safe-area-inset-bottom,0);
  box-shadow:0 -4px 24px rgba(0,0,0,.35);
}
body.light #mobile-nav{--nav-bg:237,240,248;}
.mnav-track{display:flex;overflow-x:auto;padding:11px 16px;gap:9px;scrollbar-width:none;-ms-overflow-style:none;}
.mnav-track::-webkit-scrollbar{display:none;}
.mnav-pill{flex-shrink:0;min-height:44px;padding:9px 20px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border-hi);color:var(--text-2);background:var(--surface);display:flex;align-items:center;white-space:nowrap;-webkit-tap-highlight-color:transparent;transition:background .15s,color .15s,border-color .15s;}
.mnav-pill:active{transform:scale(.93);}
.mnav-pill.active{background:var(--text);color:var(--bg);border-color:var(--text);}

/* ══════════════════════════════════════
   TOAST — repositioned, black/white
══════════════════════════════════════ */
#toast{
  position:fixed;
  bottom:160px;   /* well above the modal footer / mastered-note */
  left:50%;
  transform:translateX(-50%) translateY(12px);
  z-index:500;pointer-events:none;opacity:0;
  transition:opacity .26s,transform .26s cubic-bezier(.22,1,.36,1);
  white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-inner{
  padding:10px 24px;border-radius:999px;font-size:13px;font-weight:600;
  /* black / white — no colour */
  background:var(--text);color:var(--bg);
  box-shadow:0 4px 20px rgba(0,0,0,.35);
}

/* ══════════════════════════════════════
   MODAL OVERLAY
   z-index: 300 — below nav (400), above page
══════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  padding:16px 16px calc(70px + env(safe-area-inset-bottom,0)) 16px;
}

/* ══════════════════════════════════════
   CENTERED MODAL CARD
══════════════════════════════════════ */
.modal-card{
  position:relative;
  width:min(92vw,620px);
  max-height:82vh;
  display:flex;flex-direction:column;
  border-radius:20px;overflow:hidden;
  background:var(--surface);border:1px solid var(--border-hi);
  box-shadow:0 24px 80px rgba(0,0,0,.7),0 0 0 .5px rgba(255,255,255,.06);
  /* scale-in animation */
  animation:modal-in .3s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes modal-in{
  from{opacity:0;transform:scale(.93);}
  to  {opacity:1;transform:scale(1);}
}

/* ── × close button ── */
.modal-close{
  position:absolute;top:14px;right:14px;z-index:10;
  width:32px;height:32px;border-radius:50%;
  background:var(--surface-3);border:1px solid var(--border-hi);
  color:var(--text-2);font-size:16px;line-height:1;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s,transform .12s;
}
.modal-close:hover{background:var(--surface-2);color:var(--text);}
.modal-close:active{transform:scale(.88);}

/* ── sticky header ── */
.modal-sticky{
  flex-shrink:0;padding:18px 52px 14px 20px;
  border-bottom:1px solid var(--border);
}
.modal-wnum{

.modal-goal{

.modal-tbar{flex-shrink:0;display:flex;margin:12px 18px 0;border-bottom:1px solid var(--border);}
.modal-tbar .tbtn{flex:1;text-align:center;padding:9px 4px;font-size:10px;min-height:40px;}

/* ── scrollable body ── */
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:14px 18px 20px;}

.tab-dots{display:flex;justify-content:center;gap:7px;padding:16px 0 4px;}
.tab-dot{height:5px;width:5px;border-radius:3px;background:var(--border-hi);transition:all .25s cubic-bezier(.4,0,.2,1);}

PHASES.forEach(ph=>{ph.weeks=W.filter(w=>w.phase===ph.id).map(w=>w.week);});
const phOf=n=>PHASES.find(p=>p.weeks.includes(n))||PHASES[0];
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function getScore(wn){
  const w=W.find(x=>x.week===wn);if(!w)return{s:0,t:0};
  return{s:w.checks.reduce((a,_,i)=>a+(S.checks[`${wn}-${i}`]?1:0),0),t:w.checks.length};
}
function lvInfo(s,t){
  const p=t?s/t:0;
  if(!p)   return{l:'Not assessed',c:'var(--text-3)'};
  if(p<.4) return{l:'Novice',      c:'#f472b6'};
  if(p<.7) return{l:'Developing',  c:'#818cf8'};
  if(p<1)  return{l:'Solid',       c:'#60a5fa'};
  return        {l:'Mastered',    c:'#6ee7b7'};
}
const masteredCount=()=>W.filter(w=>{const{s,t}=getScore(w.week);return s===t&&t>0;}).length;

function openPdf(bk){
  const pdf=S.pdfs[bk];if(!pdf)return;
  try{
    const arr=pdf.url.split(','),bs=atob(arr[1]);
    let n=bs.length;const u8=new Uint8Array(n);
    while(n--)u8[n]=bs.charCodeAt(n);
    const blob=new Blob([u8],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.target='_blank';a.rel='noopener';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
  }catch(e){alert('Could not open PDF.\n'+e.message);}
}

let _tt=null;
function showToast(msg){
  const t=document.getElementById('toast'),tx=document.getElementById('toast-text');
  if(!t||!tx)return;
  tx.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2600);
}

function renderResources(w){

    let strip='';
    if(r.bookKey){
      strip=`<div class="pdf-strip">${pdf
        ?`<span class="pdf-fname">${esc(pdf.name)}</span>
           <div class="btn-group">
             <button class="btn btn-a" onclick="openPdf('${r.bookKey}')">Open PDF</button>

           </div>`
        :`<span class="pdf-label">Attach your copy:</span>

             <button class="btn btn-p" onclick="triggerUpload('${r.bookKey}')">Upload PDF</button>
             ${r.link?`<a href="${r.link}" target="_blank" rel="noopener" class="btn btn-g" style="text-decoration:none">Free online</a>`:''}
           </div>
           <input type="file" accept=".pdf" id="fi-${r.bookKey}" style="display:none" onchange="handleUpload('${r.bookKey}',this)">`}

    }else if(r.link){
      strip=`<div class="pdf-strip"><div class="btn-group"><a href="${r.link}" target="_blank" rel="noopener" class="btn btn-g" style="text-decoration:none">Open resource</a></div></div>`;

    return`<div class="ritem">

          <div class="rname">${esc(r.name)}</div>
          ${r.author?`<div class="rauthor">${esc(r.author)}</div>`:''}
          <div class="rdesc">${esc(r.detail)}</div>
        </div>
      </div>${strip}</div>`;
  }).join('');
  const practice=w.practice.map(p=>`

      <span class="psrc">${esc(p.source)}</span>

      ${p.link?`<a href="${p.link}" target="_blank" rel="noopener" class="plink">Visit</a>`:''}

function renderLevel(w){
  const{s,t}=getScore(w.week),info=lvInfo(s,t),done=s===t&&t>0;
  return`<div class="lvbadge">
    <div><div class="lvlabel">Current Level</div><div class="lvname" style="color:${info.c}">${info.l}</div></div>
    <div class="lvfrac">${s}<small>/${t}</small></div>
  </div>
  <div class="lvtrack"><div class="lvbar" style="width:${t?s/t*100:0}%;background:${info.c}"></div></div>
  <div class="slabel" style="margin-bottom:8px">Check what you can genuinely do</div>
  <div class="cklist">${w.checks.map((q,qi)=>{
    const on=!!S.checks[`${w.week}-${qi}`];
    return`<button class="ckitem ${on?'on':''}" data-wn="${w.week}" data-qi="${qi}" onclick="toggleCheck(${w.week},${qi})">
      <div class="ckbox"><span class="cktick">&#10003;</span></div>
      <span class="cktxt">${esc(q)}</span>
    </button>`;
  }).join('')}</div>
  ${done?`<div class="mastered-note">Week ${w.week} complete — ready to advance.</div>`:''}`;
}

const TAB_ORDER=['resources','links','notes','level'];
const TAB_LABELS=['Resources','Links','Notes','Level'];
function tabContent(w,tab){
  if(tab==='resources')return renderResources(w);
  if(tab==='links')return renderLinks(w);
  if(tab==='notes')return renderNotes(w);
  if(tab==='level')return renderLevel(w);
  return'';
}

function openModal(wn){
  if(!S.tabs[wn])S.tabs[wn]='resources';
  S.modalWeek=wn;saveState();

  document.body.classList.add('modal-open');
  renderModal();
}

function closeModal(){
  S.modalWeek=null;saveState();
  document.body.classList.remove('modal-open');
  document.getElementById('modal-root').innerHTML='';
  /* refresh cards to show any updated mastered state */
  updateProgressBar();
  /* re-render just the card that was open */
  if(S.modalWeek!==null){
    const w=W.find(x=>x.week===S.modalWeek);
    if(w)updateCardInList(w.week);
  }
  /* full list card refresh for mastered badge */
  W.forEach(w=>updateCardInList(w.week));
}

          <div class="modal-wnum">Week ${String(w.week).padStart(2,'0')} &nbsp;·&nbsp; ${ph.label} &nbsp;·&nbsp; ${w.hours}h</div>
          <div class="modal-wtitle">${esc(w.title)}</div>
        </div>
        <div class="modal-goal"><div class="modal-glabel">Weekly Goal</div>${esc(w.goal)}</div>
        <div class="modal-tbar" id="modal-tbar">
          ${TAB_ORDER.map((id,i)=>`<button class="tbtn ${tab===id?'active':''}" onclick="mSwitchTab(${w.week},'${id}')">${TAB_LABELS[i]}</button>`).join('')}
        </div>
        <div class="modal-body" id="modal-body">
          ${tabContent(w,tab)}
          <div class="tab-dots">${TAB_ORDER.map(id=>`<div class="tab-dot ${tab===id?'active':''}"></div>`).join('')}</div>
        </div>
      </div>
    </div>`;
  requestAnimationFrame(()=>attachSwipe());
}

/* Clicking the blurred overlay outside the card closes the modal */
function handleOverlayClick(e){
  if(e.target.id==='modal-overlay')closeModal();
}

function updateModalBody(){
  const body=document.getElementById('modal-body');
  if(!body||!S.modalWeek)return;
  const w=W.find(x=>x.week===S.modalWeek);
  const tab=S.tabs[w.week]||'resources';
  body.innerHTML=`
    ${tabContent(w,tab)}
    <div class="tab-dots">${TAB_ORDER.map(id=>`<div class="tab-dot ${tab===id?'active':''}"></div>`).join('')}</div>`;
  body.scrollTop=0;
}

/* ══════════════════════════════════════
   SWIPE TABS inside modal
   Strict direction lock — no diagonals
══════════════════════════════════════ */
function attachSwipe(){
  const body=document.getElementById('modal-body');
  if(!body)return;
  let g={dir:'idle',sx:0,sy:0};
  body.addEventListener('touchstart',e=>{
    g.dir='deciding';g.sx=e.touches[0].clientX;g.sy=e.touches[0].clientY;
  },{passive:true});
  body.addEventListener('touchmove',e=>{
    if(g.dir==='vertical'||g.dir==='idle')return;
    const dx=e.touches[0].clientX-g.sx,dy=e.touches[0].clientY-g.sy;
    if(g.dir==='deciding'){
      if(Math.abs(dx)>10||Math.abs(dy)>10)
        g.dir=Math.abs(dx)>Math.abs(dy)*1.8?'horizontal':'vertical';
      return;
    }
    if(g.dir==='horizontal')e.preventDefault();
  },{passive:false});
  body.addEventListener('touchend',e=>{
    if(g.dir!=='horizontal'){g.dir='idle';return;}
    const dx=e.changedTouches[0].clientX-g.sx;g.dir='idle';
    if(Math.abs(dx)<50)return;
    const cur=S.tabs[S.modalWeek]||'resources',idx=TAB_ORDER.indexOf(cur);
    if(dx<0&&idx<TAB_ORDER.length-1)mSwitchTab(S.modalWeek,TAB_ORDER[idx+1]);
    else if(dx>0&&idx>0)mSwitchTab(S.modalWeek,TAB_ORDER[idx-1]);
  },{passive:true});
}

/* ══════════════════════════════════════
   ACTIONS
══════════════════════════════════════ */
function toggleWeek(n){
  if(isMobile){openModal(n);return;}
  S.expanded=S.expanded===n?null:n;
  if(!S.tabs[n])S.tabs[n]='resources';
  saveState();render();
  if(S.expanded===n)setTimeout(()=>document.getElementById('wc-'+n)?.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function switchTab(wn,t){S.tabs[wn]=t;saveState();render();}

function mSwitchTab(wn,t){
  S.tabs[wn]=t;saveState();
  document.querySelectorAll('#modal-tbar .tbtn').forEach((btn,i)=>btn.classList.toggle('active',TAB_ORDER[i]===t));
  updateModalBody();
}

/* ── setFilter — NO re-render, just DOM patches (no nav scroll jump) ── */
function setFilter(id){
  S.filter=id;saveState();
  document.querySelectorAll('[data-id]').forEach(el=>el.classList.toggle('active',+el.dataset.id===id));
  document.querySelectorAll('.week-card[data-phase]').forEach(card=>card.classList.toggle('hidden',id!==0&&+card.dataset.phase!==id));
}

function toggleCost(){S.costOpen=!S.costOpen;saveState();render();}

/* ── toggleCheck — mastered note appears AND disappears reactively ── */
function toggleCheck(wn,qi){
  const key=`${wn}-${qi}`;S.checks[key]=!S.checks[key];saveState();

  if(S.modalWeek===wn){
    /* DOM-patch check item */
    const item=document.querySelector(`[data-wn="${wn}"][data-qi="${qi}"]`);
    if(item){
      item.classList.toggle('on',!!S.checks[key]);
      const box=item.querySelector('.ckbox');
      if(box){box.classList.remove('pop');void box.offsetWidth;
        box.classList.add('pop');
        box.addEventListener('animationend',()=>box.classList.remove('pop'),{once:true});}
    }
    /* Patch level badge */
    const{s,t}=getScore(wn),info=lvInfo(s,t);
    const ln=document.querySelector('.lvname');
    const lf=document.querySelector('.lvfrac');
    const lb=document.querySelector('.lvbar');
    if(ln){ln.textContent=info.l;ln.style.color=info.c;}
    if(lf)lf.innerHTML=`${s}<small>/${t}</small>`;
    if(lb){lb.style.width=`${t?s/t*100:0}%`;lb.style.background=info.c;}
    /* Mastered note — reactive add/remove */
    const done=s===t&&t>0,existing=document.querySelector('.mastered-note');
    if(done&&!existing){
      const ck=document.querySelector('.cklist');
      if(ck){const el=document.createElement('div');el.className='mastered-note';
        el.textContent=`Week ${wn} complete — ready to advance.`;
        ck.insertAdjacentElement('afterend',el);}
      showToast('Week '+wn+' mastered');
    }else if(!done&&existing){existing.remove();}
    /* Update list behind */
    updateCardInList(wn);updateProgressBar();
  }else{render();}
}

function saveNote(wn,v){
  S.notes[wn]=v;saveState();
  const c=document.querySelector('.ncount');if(c)c.textContent=v.length+' chars';
}
function clearNote(wn){
  S.notes[wn]='';saveState();
  if(S.modalWeek===wn)updateModalBody();else render();
}
function triggerUpload(bk){document.getElementById('fi-'+bk)?.click();}
function handleUpload(bk,inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{S.pdfs[bk]={name:f.name,url:e.target.result};saveState();
    if(S.modalWeek)updateModalBody();else render();};
  r.readAsDataURL(f);
}
function removePdf(bk){
  delete S.pdfs[bk];saveState();
  if(S.modalWeek)updateModalBody();else render();
}

function updateCardInList(wn){
  const el=document.getElementById('wc-'+wn);if(!el)return;
  const div=document.createElement('div');div.innerHTML=renderCard(W.find(x=>x.week===wn));
  el.replaceWith(div.firstElementChild);
}
function updateProgressBar(){
  const m=masteredCount();
  const fill=document.querySelector('.prog-fill');
  const pct=document.querySelectorAll('.prog-meta span')[1];
  const sv=document.querySelectorAll('.sv')[3];
  if(fill)fill.style.width=`${m/24*100}%`;
  if(pct)pct.textContent=`${Math.round(m/24*100)}%`;
  if(sv)sv.textContent=`${m}/24`;
}

/* ══════════════════════════════════════
   BOOT
══════════════════════════════════════ */
loadState();initTheme();render();
</script>
